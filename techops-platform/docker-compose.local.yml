---
# =============================================================================
# TechOps Platform — LOCAL DEVELOPMENT OVERRIDE
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Differences from production:
#  - No Traefik TLS (plain HTTP on localhost ports)
#  - Services exposed directly on local ports
#  - Relaxed auth settings for dev convenience
# =============================================================================

name: techops-platform

services:

  # Disable Traefik in local mode — access services by port directly
  traefik:
    profiles:
      - disabled

  forgejo:
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=false"
    environment:
      FORGEJO__server__DOMAIN: localhost
      FORGEJO__server__ROOT_URL: http://localhost:3000/
      FORGEJO__service__DISABLE_REGISTRATION: "false"

  vikunja:
    ports:
      - "3456:3456"
    labels:
      - "traefik.enable=false"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://localhost:3456/
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"

  bookstack:
    ports:
      - "6875:80"
    labels:
      - "traefik.enable=false"
    environment:
      APP_URL: http://localhost:6875

  n8n:
    ports:
      - "5678:5678"
    labels:
      - "traefik.enable=false"
    environment:
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/

  meilisearch:
    ports:
      - "7700:7700"
    labels:
      - "traefik.enable=false"

  grafana:
    ports:
      - "3001:3000"
    labels:
      - "traefik.enable=false"
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_SERVER_DOMAIN: localhost
      GF_AUTH_DISABLE_LOGIN_FORM: "false"

  prometheus:
    ports:
      - "9090:9090"
    labels:
      - "traefik.enable=false"

  loki:
    ports:
      - "3100:3100"
