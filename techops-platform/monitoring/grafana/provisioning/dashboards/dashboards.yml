# =============================================================================
# TechOps Platform — Grafana Dashboard Provisioning
# Auto-loads dashboards from the dashboards directory
# =============================================================================

apiVersion: 1

providers:
  - name: TechOps Dashboards
    orgId: 1
    folder: TechOps Platform
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
