# =============================================================================
# TechOps Platform — Grafana Datasource Provisioning
# Auto-configures Prometheus and Loki as datasources on startup
# =============================================================================

apiVersion: 1

datasources:

  - name: Prometheus
    type: prometheus
    access: proxy
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: '15s'
      queryTimeout: '60s'
      httpMethod: POST

  - name: Loki
    type: loki
    access: proxy
    uid: loki
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60

  - name: PostgreSQL
    type: postgres
    access: proxy
    uid: postgres
    url: postgres:5432
    database: techops_app
    user: ${POSTGRES_USER}
    editable: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
