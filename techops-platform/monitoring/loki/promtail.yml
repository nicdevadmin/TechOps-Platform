# =============================================================================
# TechOps Platform — Promtail Configuration
# Ships Docker container logs and system logs to Loki
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Docker container logs (reads from Docker socket)
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["com.docker.compose.project=techops-platform"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_compose_project']
        target_label: 'project'
    pipeline_stages:
      - docker: {}
      - labels:
          container:
          service:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano

  # System logs
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: techops-host
          __path__: /var/log/syslog

  # Auth logs
  - job_name: auth-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: techops-host
          __path__: /var/log/auth.log
